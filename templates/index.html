<!DOCTYPE html>
<html>
<head>
    <title>Finance Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        input, button {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        button {
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

    <h1>📊 My Finance Dashboard</h1>

    <form method="POST" action="/stock">
        <input name="symbol" placeholder="Enter stock symbol (AAPL, TSLA)" required>
        <br>
        <button type="submit">Search</button>
    </form>

</body>
</html>
