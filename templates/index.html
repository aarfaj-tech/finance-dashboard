<!DOCTYPE html>
<html>
<head>
    <title>Finance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container text-center mt-5">

    <h1 class="mb-4">📊 My Finance Dashboard</h1>

    <p class="text-muted">Analyze stocks like a real investor</p>

    <!-- FORM -->
    <form method="POST" class="mb-4">

        <div class="d-flex justify-content-center">

            <select name="stock" class="form-control w-25 me-2">
                {% for s in stocks %}
                <option value="{{ s }}">{{ s }}</option>
                {% endfor %}
            </select>

            <input type="number" name="shares" class="form-control w-25 me-2" placeholder="Shares">

            <button class="btn btn-primary">Analyze</button>

        </div>

    </form>

    <!-- STOCK INFO -->
    <div class="row justify-content-center">

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h5>📌 Stock</h5>
                <h3>{{ stock }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h5>💲 Price</h5>
                <h3>${{ price }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h5>📈 Change</h5>
                <h3>{{ change }}%</h3>
            </div>
        </div>

    </div>

    <!-- PORTFOLIO -->
    <div class="card p-3 shadow mt-4">
        <h4>💰 Portfolio Value</h4>
        <h2>${{ portfolio_value }}</h2>
        <p>{{ shares }} shares of {{ stock }}</p>
    </div>

    <!-- CHART -->
    <div class="mt-4">
        <h4>📊 Price Chart</h4>
        <img src="/{{ chart }}" class="img-fluid rounded shadow">
    </div>

</div>

</body>
</html>
